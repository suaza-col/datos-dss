# Municipal Map
huila_map:
  id: "HUILA_MUNICIPAL_MAP"
  names:
    es: "Mapa municipal de Huila - Comparación entre municipios"
    en: "Huila Municipal Map - Inter-municipality comparison"
  source:
    name: "GADM (Global Administrative Areas Database)"
    url: "https://gadm.org/"
  category: "health/spatial"
  processing:
    type: "spatial"
    script: "src/indicators/health/huila_map/huila_map.R"
  output:
    format: ["geojson", "csv"]
    structure: "spatial"
    files:
      - "map_cobertura_bruta"
      - "map_cobertura_neta"
      - "map_desercion"
      - "map_aprobacion"
      - "map_reprobacion"
      - "map_repitencia"
      - "map"
    columns:
      - name: "municipio"
        type: "character"
        description: "Municipality name"
      - name: "cobertura_bruta"
        type: "numeric"
        description: "Gross coverage rate (%)"
      - name: "cobertura_neta"
        type: "numeric"
        description: "Net coverage rate (%)"
      - name: "desercion"
        type: "numeric"
        description: "Dropout rate (%)"
      - name: "aprobacion"
        type: "numeric"
        description: "Pass rate (%)"
      - name: "reprobacion"
        type: "numeric"
        description: "Fail rate (%)"
      - name: "repitencia"
        type: "numeric"
        description: "Repetition rate (%)"
  updated: "2026-03-14"

# SMV Mock Map — must run before all simulation scripts that read SMV_map.csv
smv_map:
  id: "SMV_MOCK_MAP"
  names:
    es: "Mapa municipal de San Martín del Valle (datos ficticios)"
    en: "San Martín del Valle Municipal Map (mock data)"
  source:
    name: "GADM (Global Administrative Areas Database) — datos ficticios"
    url: "https://gadm.org/"
  category: "mock/spatial"
  processing:
    type: "mock"
    script: "src/mock/SMV_map.R"
  output:
    format: ["geojson", "csv"]
    structure: "spatial"
    files:
      - "SMV_municipalities"
      - "SMV_map"
  updated: "2026-04-14"

# Maternal Mortality Rate — reads SMV_map.csv; must run after smv_map
