# Suicide Mortality Rate - Huila (Colombia)
suicide_huila:
  id: "SUICIDE_MORTALITY_HUILA"
  names:
    es: "Mortalidad por suicidio (por 100.000 hab.) - Huila"
    en: "Suicide Mortality Rate (per 100,000 inhabitants) - Huila"
  source:
    name: "Observatorio de Salud del Huila"
    url: "https://www.huila.gov.co/observatoriosalud/loader.php?lServicio=Tools2&lTipo=descargas&lFuncion=descargar&idFile=84079"
  category: "health/mental-health"
  processing:
    type: "direct_download"
    format: "xlsx"
    script: "src/indicators/health/suicide/suicide_huila.R"
  output:
    format: ["csv", "parquet"]
    structure: "long"
    columns:
      - name: "iso3"
        type: "character"
      - name: "territorio"
        type: "character"
      - name: "cod_subnacional"
        type: "character"
      - name: "cod_local"
        type: "character"
      - name: "anio"
        type: "integer"
      - name: "sexo"
        type: "character"
        values: ["Masculino", "Femenino", "Total"]
      - name: "valor"
        type: "numeric"
      - name: "indicador"
        type: "character"
  updated: "2026-03-09"

# Analytics: Deserción Escolar × Mortalidad por Suicidio - Suaza
analytics_suaza:
  id: "ANALYTICS_SUAZA"
  names:
    es: "Análisis de rezago: deserción escolar y mortalidad por suicidio en Suaza"
    en: "Lag analysis: school dropout and suicide mortality in Suaza"
  source:
    name: "Observatorio de Salud del Huila / MEN datos.gov.co"
  category: "health/analytics"
  processing:
    type: "cross_indicator"
    script: "src/indicators/health/analytics/analytics_suaza.R"
    depends_on: ["suicide_huila", "education_suaza"]
  output:
    format: ["csv", "parquet"]
    structure: "long"
    files:
      - "analytics_suaza"
      - "analytics_suaza_lags"
  updated: "2026-03-13"

# Huila Municipal Map
huila_map:
  id: "HUILA_MUNICIPAL_MAP"
  names:
    es: "Mapa municipal de Huila - Comparación entre municipios"
    en: "Huila Municipal Map - Inter-municipality comparison"
  source:
    name: "GADM (Global Administrative Areas Database)"
    url: "https://gadm.org/"
  category: "health/spatial"
  processing:
    type: "spatial"
    script: "src/indicators/health/huila_map/huila_map.R"
  output:
    format: ["geojson", "csv"]
    structure: "spatial"
    files:
      - "huila_cobertura_bruta"
      - "huila_cobertura_neta"
      - "huila_desercion"
      - "huila_aprobacion"
      - "huila_reprobacion"
      - "huila_repitencia"
      - "huila_map"
    # CSV columns; GeoJSON features may additionally include GADM attributes
    columns:
      - name: "municipio"
        type: "character"
        description: "Municipality name"
      - name: "cobertura_bruta"
        type: "numeric"
        description: "Gross coverage rate (%)"
      - name: "cobertura_neta"
        type: "numeric"
        description: "Net coverage rate (%)"
      - name: "desercion"
        type: "numeric"
        description: "Dropout rate (%)"
      - name: "aprobacion"
        type: "numeric"
        description: "Pass rate (%)"
      - name: "reprobacion"
        type: "numeric"
        description: "Fail rate (%)"
      - name: "repitencia"
        type: "numeric"
        description: "Repetition rate (%)"
  updated: "2026-03-14"